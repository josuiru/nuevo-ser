name: nuevo_ser_companion
description: Acompañamiento (Cuaderno, Mosaicos, dashboards de aula y cuidador) de la Colección Nuevo Ser Kids. Cliente HTTP de los endpoints /companion/* del plugin nuevo-ser-core.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Cliente HTTP a /wp-json/nuevo-ser/v1/companion/*.
  http: ^1.2.0

  # ExcepcionApi se reusa desde el cliente HTTP del core.
  nuevo_ser_core:
    path: ../nuevo_ser_core

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
