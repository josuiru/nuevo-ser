name: nuevo_ser

packages:
  - apps/*
  - packages/*

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    description: Análisis estático en cada paquete
    exec:
      concurrency: 1
      failFast: false
    run: flutter analyze

  test:
    description: Tests Flutter en cada paquete que tenga test/
    exec:
      concurrency: 1
      failFast: false
    run: flutter test
    packageFilters:
      dirExists:
        - test

  format:
    description: Formato Dart sin escribir (--set-exit-if-changed)
    exec:
      concurrency: 1
      failFast: false
    run: dart format --set-exit-if-changed .

  format-fix:
    description: Formato Dart en sitio
    exec:
      concurrency: 1
      failFast: false
    run: dart format .
