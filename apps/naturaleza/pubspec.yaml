name: naturaleza_flutter
description: "Cuaderno de campo de naturaleza (animales, insectos y plantas)"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Mapa
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # GPS y permisos
  geolocator: 12.0.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0

  # Cámara y archivos
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Almacenamiento local
  sqflite: ^2.3.3
  shared_preferences: ^2.3.2

  # HTTP
  http: ^1.2.2

  # Caché persistente de imágenes de red (galerías Wikipedia/iNaturalist)
  cached_network_image: ^3.4.1

  # Compartir y exportar
  share_plus: ^10.0.2
  archive: ^3.6.1

  # Utilidades
  intl: ^0.19.0
  url_launcher: ^6.3.0
  crypto: ^3.0.7

  # Plataforma compartida del monorepo (gestor de fotos, PDF, UI)
  nuevo_ser_core:
    path: ../../packages/nuevo_ser_core

  # Sensores (brújula y acelerómetro para medir orientación de estratos)
  sensors_plus: ^6.0.1
  flutter_compass: ^0.8.1

  # Selector de ficheros (backup/restore, importar GPX)
  file_picker: ^8.1.4

  # Generación de PDF (informes de salida)
  pdf: ^3.11.1
  printing: ^5.13.4
  flutter_map_marker_cluster: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  # Genera el splash nativo Android para que el primer arranque no
  # sea una pantalla en blanco — invocar con
  # `dart run flutter_native_splash:create` cuando cambie el logo.
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 24
  adaptive_icon_background: "#2D3A2E"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#2D3A2E"
  image: assets/logo.png
  android: true
  ios: false
  android_12:
    color: "#2D3A2E"
    image: assets/logo.png
