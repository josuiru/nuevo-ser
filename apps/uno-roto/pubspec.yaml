name: uno_roto
description: "Uno Roto — prototipo del combate"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+6

environment:
  sdk: ^3.5.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # Localización del juego (doc 03 §idiomas: es/eu/ca desde día cero).
  # Castellano por defecto; euskera y catalán como esqueleto listo para
  # recibir las traducciones humanas del guion. flutter_localizations es
  # de Flutter; intl es la dependencia que la generación gen-l10n usa.
  flutter_localizations:
    sdk: flutter
  intl: any

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Persistencia local simple clave-valor: índice de la noche actual,
  # timestamp de la última sesión, cualquier ajuste en el futuro.
  shared_preferences: ^2.2.2

  # Cliente HTTP para el sync con el backend WordPress (doc 03 §5).
  # Se usa la librería oficial de Dart; basta para los cinco endpoints
  # del plugin. No añadimos `dio` — menos deps.
  http: ^1.2.0

  # Motor de audio multi-capa para la guía sonora (doc 12). Un player
  # por capa (ambient / música / efectos / narrativos) con fades,
  # volumen independiente y modo sin sonido. audioplayers es la opción
  # estándar bien mantenida en Android; si falta el asset, el motor
  # ignora la llamada y la app sigue silenciosa.
  audioplayers: ^6.1.0

  # path_provider da el directorio de documentos donde el LocalizadorAudio
  # cachea los OGG descargados por el DescargadorAudio del core. La
  # descompresión del zip y la verificación sha256 viven en el core,
  # con sus deps `archive` y `crypto` transitivas.
  path_provider: ^2.1.4

  # Para que el niño pueda dibujar a sus personajes en papel,
  # fotografiarlos y subirlos a la app — image_picker abre la cámara
  # o la galería. Las imágenes se guardan localmente bajo el
  # directorio de documentos del perfil; nunca salen del aparato.
  image_picker: ^1.1.2

  # Plataforma compartida de la Colección Nuevo Ser Kids — extracción
  # iniciada en C5 del refactor. Las apps de juegos consumen los
  # packages por path; al migrar a pub.dev se sustituirá por versión.
  nuevo_ser_core:
    path: ../../packages/nuevo_ser_core
  nuevo_ser_tutor:
    path: ../../packages/nuevo_ser_tutor

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^4.0.0

  # Genera el splash nativo Android para que el primer arranque no
  # sea una pantalla en blanco.
  flutter_native_splash: ^2.4.1

# Splash nativo Android: violeta característico de Uno Roto sobre
# fondo oscuro (paleta de Plenos), sin imagen — el logo es CustomPainter
# en runtime y todavía no tiene PNG estático.
flutter_native_splash:
  color: "#1B1233"
  android: true
  ios: false
  android_12:
    color: "#1B1233"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Genera la clase AppLocalizations a partir de los ARB en lib/l10n.
  # Configurado en l10n.yaml.
  generate: true

  assets:
    - assets/data/skills.json
    - assets/data/faro_banco_v0_2.json
    # Carpetas de sonido (doc 12). Pueden estar vacías: el motor
    # sonoro tolera assets ausentes y la app no falla.
    - assets/sonido/ambient/
    - assets/sonido/musica/
    - assets/sonido/efectos/
    - assets/sonido/narrativos/
    # Voces TTS por personaje (generadas via ElevenLabs, ver
    # scripts/sonido/generar_voces_eleven.sh). Subcarpetas vacías
    # son válidas: el motor sonoro tolera ausencia de archivos.
    - assets/sonido/voces/sora/
    - assets/sonido/voces/fragmentoKurz/
    - assets/sonido/voces/fragmentoEco/

  fonts:
    # Cormorant Garamond — voz de los Fragmentos nombrados (Kurz, Eco,
    # Zafrán, Vorax). Guía visual §5. Variable fonts de google/fonts
    # (OFL). Usamos el eje de peso dinámico.
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Variable.ttf
        - asset: assets/fonts/CormorantGaramond-Italic-Variable.ttf
          style: italic

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
