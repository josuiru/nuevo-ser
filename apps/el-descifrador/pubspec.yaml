name: el_descifrador
description: "El Descifrador — juego de oficio civil para descifrar documentos en lenguas que no dominas. Cuarto juego Kids de la Colección Nuevo Ser."
publish_to: 'none'

# Versión esqueleto. Se incrementa al cerrar cada fase del roadmap del paquete documental.
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Las cuatro lenguas peninsulares cooficiales como L1 desde el día uno
  # (decisión cerrada 2026-05-13). Castellano canónico + euskara + catalán
  # + gallego. Traducciones humanas pendientes de asesoría lingüística.
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # Persistencia local del cuaderno propio del niño, hipótesis fechadas,
  # documentos resueltos. Doc 06 y doc 16.
  shared_preferences: ^2.2.2

  # Cliente HTTP para sync opcional al backend WordPress de la Colección
  # (doc 16 §5.2). Opt-in por cuidador.
  http: ^1.2.0

  # Plataforma compartida de la Colección Nuevo Ser Kids. Las apps de
  # juegos consumen los packages por path.
  nuevo_ser_core:
    path: ../../packages/nuevo_ser_core
  nuevo_ser_tutor:
    path: ../../packages/nuevo_ser_tutor

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

# Splash nativo Android: papel envejecido sobre fondo verde-mar
# atlántico de La Estafeta — sin imagen, el juego todavía no
# tiene logo en assets/.
#
# La dependencia `flutter_native_splash` se quitó intencionalmente
# del dev_dependencies tras generar los assets con
# `dart run flutter_native_splash:create` una vez: el template
# `android/` recién creado por `flutter create` la registraba mal
# como plugin runtime en `GeneratedPluginRegistrant.java` y rompía
# el build. Los XMLs ya generados (`launch_background.xml` +
# `values-v31/styles.xml`) persisten en android/ y no necesitan el
# paquete para funcionar. Si se cambia el color, reinstalar
# temporalmente `flutter_native_splash: ^2.4.1` en dev_dependencies,
# regenerar, y volver a quitarlo.
flutter_native_splash:
  color: "#2C4F5E"
  android: true
  ios: false
  android_12:
    color: "#2C4F5E"

flutter:
  uses-material-design: true

  # Genera AppLocalizations a partir de los ARB en lib/l10n.
  # Configurado en l10n.yaml.
  generate: true

  # Corpus base de La Estafeta. Manifiesto declara qué piezas se
  # empaquetan con la app. Las piezas en estado distinto de
  # validada_para_produccion existen aquí para tests; el motor de
  # selección las ignora para servir al niño.
  # Ver `el-descifrador-16-arquitectura-tecnica.md` §4.1.
  assets:
    - assets/corpus/manifiesto.json
    - assets/corpus/piezas/
