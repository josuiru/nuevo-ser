name: las_versiones
description: "Las Versiones — juego de pensamiento histórico para 10-14 años. Fase 10 del roadmap, esqueleto inicial cableado a la plataforma nuevo-ser-core."
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Localización del juego (doc 01 §14: castellano/euskera/catalán desde
  # día cero). intl es la dependencia que la generación gen-l10n
  # consume, aunque todavía no usemos ARBs — estará lista cuando empecemos.
  flutter_localizations:
    sdk: flutter
  intl: any

  # Persistencia local clave-valor — para idioma de la app, perfil
  # activo, lista de perfiles, token JWT del backend. La migración a
  # Isar (que el doc 14 §3.1 prescribe) está diferida a v1.5 igual que
  # en uno-roto, para no inflar alcance antes de tener producto.
  shared_preferences: ^2.2.2

  # Plataforma compartida de la Colección Nuevo Ser Kids — extracciones
  # del refactor C5/C6 (gestor multi-perfil, repositorio de cuenta
  # backend, repositorio de idioma, motor adaptativo, capa audio…).
  # Importada por path mientras vivamos en el monorepo; al publicarse
  # se sustituirá por versión.
  nuevo_ser_core:
    path: ../../packages/nuevo_ser_core

  # Cliente HTTP de los endpoints de acompañamiento — sólo se usa en
  # F8.7 para sincronizar el Mosaico v2 con `POST /companion/mosaicos`
  # cuando hay token JWT. Sin token, el juego sigue siendo plenamente
  # local; el sync es estrictamente opt-in por entrega.
  nuevo_ser_companion:
    path: ../../packages/nuevo_ser_companion

  # Cliente HTTP genérico — el sincronizador del Mosaico distingue
  # SocketException/TimeoutException de errores HTTP propios para
  # reportar la causa al jugador con precisión.
  http: ^1.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  # Genera el splash nativo Android para que el primer arranque no
  # sea una pantalla en blanco.
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  # Atmósferas fotográficas opcionales por ambiente. Cada foto del
  # bundle es CC-BY-SA / CC-BY / dominio público — los créditos
  # individuales viven en `assets/atmosferas/CREDITOS.md`. Si un
  # ambiente no tiene foto asociada, `FondoAmbiente` cae al motivo
  # procedural por categoría. El bundle es opt-in: añadir o quitar
  # fotos no rompe nada.
  assets:
    - assets/atmosferas/
    # Retratos ilustrados de personajes — JPEG 512×512 calidad 90.
    # Generados con OpenAI ChatGPT (DALL-E 3) — ver atribución y
    # licencia en `PantallaCreditos`. Migración progresiva: cada voz
    # sin retrato sigue cayendo al avatar procedural por estamento.
    # `assets/personajes/master/` (rejilla maestra de referencia + PNGs
    # originales sin redimensionar) NO entra al bundle por ser un
    # subdirectorio.
    - assets/personajes/
    # Logo de la Colección Nuevo Ser (línea madre, compartido por los
    # juegos Kids). Cableado al icono Android via mipmaps generados
    # desde aquí. También disponible como asset en runtime para la
    # pantalla de inicio del juego.
    - assets/marca/

# Splash nativo Android: fondo sepia oscuro coherente con la
# PaletaArchivo provisional + logo de la marca centrado.
flutter_native_splash:
  color: "#1F1E1A"
  image: assets/marca/las_versiones_logo.png
  android: true
  ios: false
  android_12:
    color: "#1F1E1A"
    image: assets/marca/las_versiones_logo.png
