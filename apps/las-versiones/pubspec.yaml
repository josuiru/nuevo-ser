name: las_versiones
description: "Las Versiones — juego de pensamiento histórico para 10-14 años. Fase 10 del roadmap, esqueleto inicial cableado a la plataforma nuevo-ser-core."
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Localización del juego (doc 01 §14: castellano/euskera/catalán desde
  # día cero). intl es la dependencia que la generación gen-l10n
  # consume, aunque todavía no usemos ARBs — estará lista cuando empecemos.
  flutter_localizations:
    sdk: flutter
  intl: any

  # Persistencia local clave-valor — para idioma de la app, perfil
  # activo, lista de perfiles, token JWT del backend. La migración a
  # Isar (que el doc 14 §3.1 prescribe) está diferida a v1.5 igual que
  # en uno-roto, para no inflar alcance antes de tener producto.
  shared_preferences: ^2.2.2

  # Plataforma compartida de la Colección Nuevo Ser Kids — extracciones
  # del refactor C5/C6 (gestor multi-perfil, repositorio de cuenta
  # backend, repositorio de idioma, motor adaptativo, capa audio…).
  # Importada por path mientras vivamos en el monorepo; al publicarse
  # se sustituirá por versión.
  nuevo_ser_core:
    path: ../../packages/nuevo_ser_core

  # Cliente HTTP de los endpoints de acompañamiento — sólo se usa en
  # F8.7 para sincronizar el Mosaico v2 con `POST /companion/mosaicos`
  # cuando hay token JWT. Sin token, el juego sigue siendo plenamente
  # local; el sync es estrictamente opt-in por entrega.
  nuevo_ser_companion:
    path: ../../packages/nuevo_ser_companion

  # Cliente HTTP genérico — el sincronizador del Mosaico distingue
  # SocketException/TimeoutException de errores HTTP propios para
  # reportar la causa al jugador con precisión.
  http: ^1.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
