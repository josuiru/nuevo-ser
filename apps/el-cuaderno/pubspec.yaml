name: el_cuaderno
description: "El Cuaderno — herramienta de campo digital con alma pedagógica para 9-13 años. Tercer juego de Colección Nuevo Ser Kids. Sprint 1: scaffolding mínimo con datos sembrados, sin red, sin LLM, sin geolocalización."
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Localización del juego (biblia §10: castellano/euskera/catalán desde
  # día cero). intl alimenta a la generación gen_l10n nativa.
  flutter_localizations:
    sdk: flutter
  intl: any

  # Persistencia local cifrada (doc 03 §2.1, §10.2). Primer paquete del
  # monorepo que adopta Isar — decisión específica de El Cuaderno por
  # los volúmenes de medios (fotos, dibujos), las queries por
  # sit_spot/región/estación/misterio, y el cifrado en reposo que el
  # principio 1 de la biblia requiere. Adopción acotada al juego en S1;
  # el ascenso a `nuevo_ser_core` se evaluará si tiene sentido para más
  # juegos.
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Generación de UUID v4 para Observacion/SitSpot/Misterio/PaginaCuaderno.
  uuid: ^4.4.0

  # Resolución del directorio de documentos para colocar la base Isar.
  path_provider: ^2.1.4

  # Persistencia clave-valor para configuración global (idioma elegido,
  # token JWT del backend cuando lo haya, versión de paquete sonoro
  # cuando lleguen). Convive con Isar: shared_preferences se queda con
  # los singletons globales; Isar se ocupa del cuaderno completo
  # (observaciones, sit spots, fotos, dibujos).
  shared_preferences: ^2.2.2

  # Plataforma compartida de la Colección Nuevo Ser Kids — extracciones
  # del refactor C5/C6 (RepositorioIdiomaApp, RepositorioCuentaBackend,
  # GestorPerfiles, ClienteApi, motor adaptativo…). Importada por path
  # mientras vivamos en el monorepo; se sustituye por versión publicada
  # cuando el monorepo se separe.
  nuevo_ser_core:
    path: ../../packages/nuevo_ser_core

  # Cliente HTTP de los endpoints de acompañamiento del plugin
  # `nuevo-ser-core` (`/wp-json/nuevo-ser/v1/companion/*`). El Cuaderno
  # lo usa en S9 para subir agregados semanales (counts y reparto, sin
  # texto libre) a `/companion/aggregates/weekly` y obtener el
  # `summary_text` y `conversation_prompt` que el LLM server-side
  # genera para la vista del cuidador. La frontera de privacidad sigue
  # siendo la misma del cliente local: solo viajan IDs y counts.
  nuevo_ser_companion:
    path: ../../packages/nuevo_ser_companion

  # Cliente HTTP de la cola de sincronización (`ClienteElCuaderno`).
  # Llamadas al backend WP `/wp-json/nuevo-ser/v1/el-cuaderno/*`. Las
  # respuestas son JSON; serialización a mano para mantener el cliente
  # auditable.
  http: ^1.2.2

  # Hash sha256 del `what_seen` antes de cruzar la red. La frontera
  # de privacidad (doc 03 §3.3) impide que el texto libre del niño
  # llegue al servidor — solo viaja el digest.
  crypto: ^3.0.5

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

  # Generador de modelos Isar (anotaciones → código). Se invoca con
  # `dart run build_runner build --delete-conflicting-outputs`.
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  # Localización gen_l10n nativa de Flutter (no intl_utils). Los ARB
  # viven en lib/nucleo/i18n/arb/, la generación cae en
  # .dart_tool/flutter_gen/gen_l10n/.
  generate: true
