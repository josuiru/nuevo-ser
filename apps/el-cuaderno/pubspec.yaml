name: el_cuaderno
description: "El Cuaderno — herramienta de campo digital con alma pedagógica para 9-13 años. Tercer juego de Colección Nuevo Ser Kids. Sprint 1: scaffolding mínimo con datos sembrados, sin red, sin LLM, sin geolocalización."
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Localización del juego (biblia §10: castellano/euskera/catalán desde
  # día cero). intl alimenta a la generación gen_l10n nativa.
  flutter_localizations:
    sdk: flutter
  intl: any

  # Persistencia local cifrada (doc 03 §2.1, §10.2). Primer paquete del
  # monorepo que adopta Isar — decisión específica de El Cuaderno por
  # los volúmenes de medios (fotos, dibujos), las queries por
  # sit_spot/región/estación/misterio, y el cifrado en reposo que el
  # principio 1 de la biblia requiere. Adopción acotada al juego en S1;
  # el ascenso a `nuevo_ser_core` se evaluará si tiene sentido para más
  # juegos.
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Generación de UUID v4 para Observacion/SitSpot/Misterio/PaginaCuaderno.
  uuid: ^4.4.0

  # Resolución del directorio de documentos para colocar la base Isar.
  path_provider: ^2.1.4

  # Persistencia clave-valor para configuración global (idioma elegido,
  # token JWT del backend cuando lo haya, versión de paquete sonoro
  # cuando lleguen). Convive con Isar: shared_preferences se queda con
  # los singletons globales; Isar se ocupa del cuaderno completo
  # (observaciones, sit spots, fotos, dibujos).
  shared_preferences: ^2.2.2

  # Plataforma compartida de la Colección Nuevo Ser Kids — extracciones
  # del refactor C5/C6 (RepositorioIdiomaApp, RepositorioCuentaBackend,
  # GestorPerfiles, ClienteApi, motor adaptativo…). Importada por path
  # mientras vivamos en el monorepo; se sustituye por versión publicada
  # cuando el monorepo se separe.
  nuevo_ser_core:
    path: ../../packages/nuevo_ser_core

  # Cliente HTTP de los endpoints de acompañamiento del plugin
  # `nuevo-ser-core` (`/wp-json/nuevo-ser/v1/companion/*`). El Cuaderno
  # lo usa en S9 para subir agregados semanales (counts y reparto, sin
  # texto libre) a `/companion/aggregates/weekly` y obtener el
  # `summary_text` y `conversation_prompt` que el LLM server-side
  # genera para la vista del cuidador. La frontera de privacidad sigue
  # siendo la misma del cliente local: solo viajan IDs y counts.
  nuevo_ser_companion:
    path: ../../packages/nuevo_ser_companion

  # Cliente HTTP de la cola de sincronización (`ClienteElCuaderno`).
  # Llamadas al backend WP `/wp-json/nuevo-ser/v1/el-cuaderno/*`. Las
  # respuestas son JSON; serialización a mano para mantener el cliente
  # auditable.
  http: ^1.2.2

  # Hash sha256 del `what_seen` antes de cruzar la red. La frontera
  # de privacidad (doc 03 §3.3) impide que el texto libre del niño
  # llegue al servidor — solo viaja el digest.
  crypto: ^3.0.5

  # Captura de foto desde la cámara o desde la galería del dispositivo
  # para anclarla a una observación (biblia §3.2). Las imágenes se
  # mueven al directorio de documentos privado de la app y solo se
  # persiste su ruta relativa en `Observacion.fotoRutaLocal` —
  # nunca cruzan red. En Android requiere los permisos `CAMERA` y
  # `READ_MEDIA_IMAGES` declarados en `AndroidManifest.xml`.
  image_picker: ^1.1.2

  # Geolocalización **puntual** (sin tracking continuo). Solo se llama
  # cuando el niño explícitamente registra observación o configura el
  # sit spot. Las coordenadas precisas NUNCA cruzan red — se usan en
  # cliente para derivar `region_code` (NUTS aproximado) que sí viaja,
  # y para el cálculo de "¿estás en tu sit spot?" en local. La biblia
  # §2.1 prohíbe tracking en background; no usamos
  # `ACCESS_BACKGROUND_LOCATION` ni se suscribe a `getPositionStream`.
  geolocator: ^10.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

  # Generador de modelos Isar (anotaciones → código). Se invoca con
  # `dart run build_runner build --delete-conflicting-outputs`.
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

  # Generación de iconos de launcher para Android (mipmaps + adaptive)
  # y splash screen nativo a partir de los PNG de `assets/launcher/` y
  # `assets/splash/`. Los assets actuales son **placeholders** marcados
  # — la ilustradora botánica del encargo (B4 del plan A1-A10, biblia
  # §8.1: ilustración hecha a mano, NUNCA IA generativa) los sustituye
  # cuando esté.
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  # Localización gen_l10n nativa de Flutter (no intl_utils). Los ARB
  # viven en lib/nucleo/i18n/arb/, la generación cae en
  # .dart_tool/flutter_gen/gen_l10n/.
  generate: true

# ---------------------------------------------------------------------
# Configuración de flutter_launcher_icons (A7).
# Genera mipmaps Android (legacy + adaptive) desde el placeholder
# monocromo de assets/launcher/. Sustituir por el icono final de la
# ilustradora botánica (B4) cuando entre.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/launcher/icon.png"
  adaptive_icon_background: "#F5EFE2"
  adaptive_icon_foreground: "assets/launcher/icon_foreground_adaptive.png"
  min_sdk_android: 21

# ---------------------------------------------------------------------
# Configuración de flutter_native_splash (A7).
# Splash con fondo crema y placeholder centrado — sin animación. La
# ilustradora botánica (B4) entrega el icono final que sustituye el
# image: aquí.
flutter_native_splash:
  color: "#F5EFE2"
  color_dark: "#1F1E1A"
  image: "assets/splash/splash.png"
  image_dark: "assets/splash/splash.png"
  android: true
  ios: false
  android_12:
    color: "#F5EFE2"
    color_dark: "#1F1E1A"
    image: "assets/splash/splash.png"
    image_dark: "assets/splash/splash.png"
